name: UI / UX Issue
description: Report a visual glitch, layout problem, or user experience issue
title: "[UI] "
labels: ["ui/ux"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for visual bugs, layout problems, or UX friction
        that don't fit a standard bug report.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Configuration panel
        - Patchbay canvas
        - Studios panel
        - Transport bar
        - Menu bar popover
        - Connect All sheet
        - About panel
        - General / Other
    validations:
      required: true

  - type: input
    id: macos_version
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.2 (Sequoia)
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple Silicon (M1/M2/M3/M4/M5)
        - Intel
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does the issue look like? What should it look like instead?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: |
        Please attach a screenshot — it's the fastest way to understand a visual issue.
        Drag and drop images here or paste from clipboard.
      placeholder: Attach screenshots here (drag & drop or paste)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce (if applicable)
      placeholder: |
        1. Open JackMate
        2. Navigate to…
